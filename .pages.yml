media:
  - name: post_images
    label: 文章图片
    input: src/content/posts/images
    output: "./images"
    rename: safe

content:
  - name: posts
    label: 文章
    type: collection
    path: src/content/posts
    subfolders: true
    filename:
      template: "{primary}.md"
      field: create
    view:
      fields: [title, published, draft, category]
      primary: title
      sort: [published, title]
      default:
        sort: published
        order: desc
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: published
        label: 发布日期
        type: date
        required: true
        default: "{{now}}"
        options:
          time: true
          format: "yyyy-MM-dd HH:mm:ss"
      - name: updated
        label: 更新日期
        type: date
        options:
          time: true
          format: "yyyy-MM-dd HH:mm:ss"
      - name: draft
        label: 草稿
        type: boolean
        default: false
      - name: description
        label: 描述
        type: text
        options:
          maxlength: 200
      - name: image
        label: 封面图
        type: image
        options:
          media: post_images
          path: src/content/posts/images
          extensions: [avif, webp, png, jpg, jpeg]
      - name: tags
        label: 标签
        type: string
        list: true
      - name: category
        label: 分类
        type: string
      - name: lang
        label: 语言
        type: string
      - name: pinned
        label: 置顶
        type: boolean
        default: false
      - name: comment
        label: 评论
        type: boolean
        default: true
      # 单人博客，无需作者字段
      # - name: author
      #   label: 作者
      #   type: string
      - name: sourceLink
        label: 原文链接
        type: string
        pattern:
          regex: '^(?:$|https?://[^\s/?#]+(?:[/?#][^\s]*)?)$'
          message: "请输入以 http:// 或 https:// 开头的完整链接"
      # 个人博客一般不填写许可信息
      # - name: licenseName
      #   label: 许可名称
      #   type: string
      # - name: licenseUrl
      #   label: 许可链接
      #   type: string
      # 公有仓库使用 giscus 评论，密码功能无实际意义
      # - name: password
      #   label: 密码
      #   type: string
      # - name: passwordHint
      #   label: 密码提示
      #   type: string
      - name: body
        label: 正文
        type: rich-text
        options:
          media: post_images
          format: markdown

  - name: about
    label: 关于页面
    type: file
    path: src/content/spec/about.md
    format: code
    fields:
      - name: body
        label: 正文
        type: code
        options:
          format: markdown

  - name: friends
    label: 友链页面
    type: file
    path: src/content/spec/friends.mdx
    fields:
      - name: title
        label: 标题
        type: string
      - name: description
        label: 描述
        type: text
      - name: body
        label: 正文
        type: code
        options:
          format: mdx

  - name: friends-data
    label: 友链数据
    type: file
    path: src/data/friends.csv
    format: datagrid
    operations:
      delete: false

  - name: guestbook
    label: 留言板
    type: file
    path: src/content/spec/guestbook.md
    fields:
      - name: title
        label: 标题
        type: string
      - name: description
        label: 描述
        type: text
      - name: body
        label: 正文
        type: rich-text
        options:
          format: markdown

actions:
  - name: publish
    label: 发布到生产环境
    workflow: publish.yml

settings:
  content:
    merge: true
  commit:
    templates:
      create: "Create {path} (via Pages CMS)"
      update: "Update {path} (via Pages CMS)"
      delete: "Delete {path} (via Pages CMS)"
      rename: "Rename {oldPath} -> {newPath} (via Pages CMS)"
