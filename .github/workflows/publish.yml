name: Publish to Production

on:
  repository_dispatch:
    types: [publish]
  workflow_dispatch:
    inputs:
      payload:
        description: "Pages CMS 触发时附带的上下文信息（sha、路径等）"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    name: Merge staging into master
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "Pages CMS Bot"
          git config user.email "pagescms-bot@users.noreply.github.com"

      - name: Merge staging into master
        run: |
          git checkout master
          git pull origin staging --no-edit --no-rebase
          git push origin master
