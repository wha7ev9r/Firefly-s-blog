name: Sync staging with master

on:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Merge master into staging
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "Pages CMS Bot"
          git config user.email "pagescms-bot@users.noreply.github.com"

      - name: Merge master into staging
        run: |
          git checkout staging
          git pull origin master --no-edit --no-rebase
          git push origin staging
